# MNN Android AAR Build & Release
#
# Builds MNN for Android with ALL available backends:
#   CPU + OpenCL + Vulkan + ARM82 + NNAPI + QNN (Qualcomm)
# and all major features (JNI, LLM, Diffusion, OpenCV, Audio, etc.),
# packages into an AAR, and uploads to GitHub Release on tags.
#
# Triggered by:
#   - Tags matching v* or semantic versioning (e.g. v3.5.0, 3.5.0)
#   - Manual workflow_dispatch

name: Android AAR Release (All Backends)

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 3.5.1). Will create tag v{version} and build.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  android-aar-build:
    runs-on: ubuntu-latest
    env:
      AAR_NAME: MNN-Android
      # QNN SDK is downloaded from a public CDN (Alibaba Cloud)
      QNN_LIBS_URL: http://meta.alicdn.com/data/mnn/libs/qnn_inc_libs_2_37.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0   # full history needed for tagging

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ============================================================
      # Android SDK & NDK Setup
      #
      # GitHub Actions ubuntu-latest runners have Android SDK
      # pre-installed at /usr/local/lib/android/sdk.  NDK is NOT
      # pre-installed — we install it via sdkmanager below.
      #
      # If ANDROID_HOME is not set (unlikely on ubuntu-latest),
      # we fall back to the android-actions/setup-android action.
      # ============================================================
      - name: Setup Android SDK & NDK
        run: |
          set -euo pipefail

          # ---- 1. Locate Android SDK ----
          if [ -n "${ANDROID_HOME:-}" ] && [ -d "$ANDROID_HOME" ]; then
            echo "Using pre-installed Android SDK at: $ANDROID_HOME"
          elif [ -d /usr/local/lib/android/sdk ]; then
            ANDROID_HOME=/usr/local/lib/android/sdk
            echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
            echo "Found Android SDK at: $ANDROID_HOME"
          else
            echo "ERROR: No Android SDK found. Ensure android-actions/setup-android is used."
            exit 1
          fi
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

          # ---- 2. Ensure cmdline-tools (sdkmanager) ----
          SDKMANAGER=""
          # Check typical locations
          for candidate in \
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager.bat" \
            "$ANDROID_HOME/tools/bin/sdkmanager" \
            "$ANDROID_HOME/tools/bin/sdkmanager.bat"; do
            if [ -x "$candidate" ]; then
              SDKMANAGER="$candidate"
              break
            fi
          done

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found. Installing cmdline-tools..."
            CMDLINE_TOOLS_ZIP="$ANDROID_HOME/cmdline-tools.zip"
            # Download the latest cmdline-tools for Linux
            CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
            curl -fSL --retry 3 -o "$CMDLINE_TOOLS_ZIP" "$CMDLINE_TOOLS_URL"
            mkdir -p "$ANDROID_HOME/cmdline-tools"
            unzip -q "$CMDLINE_TOOLS_ZIP" -d "$ANDROID_HOME/cmdline-tools"
            # The zip extracts to cmdline-tools/cmdline-tools/... so move it
            if [ -d "$ANDROID_HOME/cmdline-tools/cmdline-tools" ]; then
              mv "$ANDROID_HOME/cmdline-tools/cmdline-tools"/* "$ANDROID_HOME/cmdline-tools/"
              rmdir "$ANDROID_HOME/cmdline-tools/cmdline-tools"
            fi
            rm -f "$CMDLINE_TOOLS_ZIP"
            SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
            if [ ! -x "$SDKMANAGER" ]; then
              echo "ERROR: Failed to install cmdline-tools"
              ls -la "$ANDROID_HOME/cmdline-tools/" 2>/dev/null || true
              exit 1
            fi
          fi
          echo "SDKMANAGER=$SDKMANAGER" >> $GITHUB_ENV
          echo "Using sdkmanager: $SDKMANAGER"

          # ---- 3. Accept licenses ----
          yes | "$SDKMANAGER" --licenses --sdk_root="$ANDROID_HOME" 2>/dev/null || true

          # ---- 4. Install NDK ----
          NDK_VERSION="25.2.9519653"  # NDK r25c
          NDK_DIR="$ANDROID_HOME/ndk/$NDK_VERSION"

          if [ -d "$NDK_DIR" ] && [ -f "$NDK_DIR/build/cmake/android.toolchain.cmake" ]; then
            echo "NDK $NDK_VERSION already installed at: $NDK_DIR"
          else
            echo "Installing NDK $NDK_VERSION..."
            echo "y" | "$SDKMANAGER" --install "ndk;$NDK_VERSION" --sdk_root="$ANDROID_HOME"
            if [ ! -f "$NDK_DIR/build/cmake/android.toolchain.cmake" ]; then
              echo "ERROR: NDK installation failed — toolchain not found at $NDK_DIR"
              exit 1
            fi
          fi
          echo "ANDROID_NDK=$NDK_DIR" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$NDK_DIR" >> $GITHUB_ENV
          echo "NDK installed at: $NDK_DIR"

          # ---- 5. Install platform & build-tools ----
          PLATFORM="platforms;android-34"
          BUILD_TOOLS="build-tools;34.0.0"
          echo "Installing $PLATFORM ..."
          echo "y" | "$SDKMANAGER" --install "$PLATFORM" --sdk_root="$ANDROID_HOME" 2>/dev/null || echo "Already installed or unavailable"
          echo "Installing $BUILD_TOOLS ..."
          echo "y" | "$SDKMANAGER" --install "$BUILD_TOOLS" --sdk_root="$ANDROID_HOME" 2>/dev/null || echo "Already installed or unavailable"

          # ---- 6. Verify ----
          echo ""
          echo "=== Environment ==="
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME"
          echo "ANDROID_NDK=$NDK_DIR"
          echo "JDK: $(java -version 2>&1 | head -1)"
          echo "CMake: $(cmake --version 2>&1 | head -1)"

      - name: Set version and optionally create tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual trigger: create tag from user-supplied version
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "Manually triggered with version ${VERSION}, creating tag ${TAG}"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${TAG}" -m "Release ${TAG}"
            git push origin "${TAG}"
          else
            # Tag push: extract version from tag name
            REF_NAME="${{ github.ref_name }}"
            CLEAN_VERSION="${REF_NAME#v}"
            echo "VERSION=${CLEAN_VERSION}" >> $GITHUB_OUTPUT
            echo "Building MNN Android AAR version: ${CLEAN_VERSION}"
          fi

      # ========== Prepare QNN SDK dependencies ==========
      - name: Download and setup QNN SDK
        run: |
          echo "Downloading QNN SDK from ${QNN_LIBS_URL}..."
          mkdir -p build_qnn_temp
          QNN_ZIP="build_qnn_temp/qnn_sdk.zip"
          curl -fL --retry 3 --retry-delay 2 -o "${QNN_ZIP}" "${QNN_LIBS_URL}"

          echo "Extracting QNN SDK..."
          QNN_TMP="build_qnn_temp/extracted"
          mkdir -p "${QNN_TMP}"
          unzip -q "${QNN_ZIP}" -d "${QNN_TMP}"

          # Find the include directory (handles nested top-level dir)
          INCLUDE_DIR=$(find "${QNN_TMP}" -type d -name "include" | head -1)
          if [ -z "${INCLUDE_DIR}" ]; then
            echo "ERROR: Failed to find 'include' directory in QNN SDK archive"
            exit 1
          fi
          EXTRACTED_QNN_DIR=$(dirname "${INCLUDE_DIR}")
          echo "QNN SDK extracted to: ${EXTRACTED_QNN_DIR}"

          # Copy to 3rdParty directory (as expected by MNN's cmake)
          QNN_3RD_PARTY="source/backend/qnn/3rdParty"
          mkdir -p "${QNN_3RD_PARTY}/include"
          mkdir -p "${QNN_3RD_PARTY}/lib"
          cp -r "${EXTRACTED_QNN_DIR}/include/"* "${QNN_3RD_PARTY}/include/"

          # Determine lib source dir (jniLibs or lib)
          SOURCE_LIBS="${EXTRACTED_QNN_DIR}/jniLibs"
          if [ ! -d "${SOURCE_LIBS}" ]; then
            SOURCE_LIBS="${EXTRACTED_QNN_DIR}/lib"
          fi
          if [ -d "${SOURCE_LIBS}" ]; then
            cp -r "${SOURCE_LIBS}/"* "${QNN_3RD_PARTY}/lib/"
          else
            echo "WARNING: No lib/jniLibs found in QNN SDK"
          fi

          # Compute absolute path and export
          QNN_SDK_ROOT_PATH="$(cd "${QNN_3RD_PARTY}" && pwd)"
          echo "QNN_SDK_ROOT=${QNN_SDK_ROOT_PATH}" >> $GITHUB_ENV
          echo "QNN SDK root set to: ${QNN_SDK_ROOT_PATH}"

          echo "=== QNN 3rdParty structure ==="
          find "${QNN_3RD_PARTY}" -type f | head -20

      # ========== Build arm64-v8a with all backends ==========
      - name: Build native libs (arm64-v8a)
        run: |
          mkdir -p build_android/arm64-v8a
          cd build_android/arm64-v8a

          cmake ../../ \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI="arm64-v8a" \
            -DANDROID_STL=c++_shared \
            -DANDROID_NATIVE_API_LEVEL=android-21 \
            -DANDROID_TOOLCHAIN=clang \
            -DMNN_USE_LOGCAT=ON \
            -DMNN_USE_SSE=OFF \
            -DMNN_OPENCL=ON \
            -DMNN_VULKAN=ON \
            -DMNN_ARM82=ON \
            -DMNN_NNAPI=ON \
            -DMNN_QNN=ON \
            -DQNN_SDK_ROOT=$QNN_SDK_ROOT \
            -DMNN_JNI=ON \
            -DMNN_BUILD_OPENCV=ON \
            -DMNN_IMGCODECS=ON \
            -DMNN_BUILD_LLM=ON \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=ON \
            -DMNN_LOW_MEMORY=ON \
            -DMNN_SUPPORT_BF16=ON \
            -DMNN_BUILD_AUDIO=ON \
            -DMNN_BUILD_DIFFUSION=ON \
            -DLLM_SUPPORT_VISION=ON \
            -DLLM_SUPPORT_AUDIO=ON \
            -DMNN_BUILD_FOR_ANDROID_COMMAND=ON \
            -DMNN_SEP_BUILD=OFF \
            -DMNN_BUILD_SHARED_LIBS=ON \
            -DMNN_BUILD_BENCHMARK=OFF \
            -DMNN_BUILD_TEST=OFF \
            -DMNN_BUILD_TOOLS=OFF \
            -DMNN_BUILD_DEMO=OFF \
            -DNATIVE_LIBRARY_OUTPUT=. \
            -DNATIVE_INCLUDE_OUTPUT=.

          make -j$(nproc)

      # ========== Build armeabi-v7a with all backends ==========
      - name: Build native libs (armeabi-v7a)
        run: |
          mkdir -p build_android/armeabi-v7a
          cd build_android/armeabi-v7a

          cmake ../../ \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK/build/cmake/android.toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_ABI="armeabi-v7a" \
            -DANDROID_STL=c++_shared \
            -DANDROID_NATIVE_API_LEVEL=android-21 \
            -DANDROID_TOOLCHAIN=clang \
            -DMNN_USE_LOGCAT=ON \
            -DMNN_USE_SSE=OFF \
            -DMNN_OPENCL=ON \
            -DMNN_VULKAN=ON \
            -DMNN_ARM82=OFF \
            -DMNN_NNAPI=ON \
            -DMNN_QNN=ON \
            -DQNN_SDK_ROOT=$QNN_SDK_ROOT \
            -DMNN_JNI=ON \
            -DMNN_BUILD_OPENCV=ON \
            -DMNN_IMGCODECS=ON \
            -DMNN_BUILD_LLM=ON \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=ON \
            -DMNN_LOW_MEMORY=ON \
            -DMNN_SUPPORT_BF16=ON \
            -DMNN_BUILD_AUDIO=ON \
            -DMNN_BUILD_DIFFUSION=ON \
            -DLLM_SUPPORT_VISION=ON \
            -DLLM_SUPPORT_AUDIO=ON \
            -DMNN_BUILD_FOR_ANDROID_COMMAND=ON \
            -DMNN_SEP_BUILD=OFF \
            -DMNN_BUILD_SHARED_LIBS=ON \
            -DMNN_BUILD_BENCHMARK=OFF \
            -DMNN_BUILD_TEST=OFF \
            -DMNN_BUILD_TOOLS=OFF \
            -DMNN_BUILD_DEMO=OFF \
            -DNATIVE_LIBRARY_OUTPUT=. \
            -DNATIVE_INCLUDE_OUTPUT=.

          make -j$(nproc)

      # ========== Collect and package AAR ==========
      - name: Package AAR
        id: package_aar
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          AAR_DIR="aar_build"
          mkdir -p ${AAR_DIR}/jni/arm64-v8a
          mkdir -p ${AAR_DIR}/jni/armeabi-v7a

          # -------- Collect arm64-v8a .so files --------
          echo "=== Collecting arm64-v8a native libs ==="

          # Main MNN library
          cp -v build_android/arm64-v8a/libMNN.so ${AAR_DIR}/jni/arm64-v8a/ 2>/dev/null || echo "No libMNN.so"

          # JNI wrapper
          cp -v build_android/arm64-v8a/source/jni/libmnncore.so ${AAR_DIR}/jni/arm64-v8a/ 2>/dev/null || echo "No JNI libmnncore.so"

          # OpenCV wrapper
          cp -v build_android/arm64-v8a/tools/cv/libMNNOpenCV.so ${AAR_DIR}/jni/arm64-v8a/ 2>/dev/null || echo "No libMNNOpenCV.so"

          # Audio wrapper
          cp -v build_android/arm64-v8a/tools/audio/libMNNAudio.so ${AAR_DIR}/jni/arm64-v8a/ 2>/dev/null || echo "No libMNNAudio.so"

          # QNN backend library (if built)
          cp -v build_android/arm64-v8a/source/backend/qnn/libMNN_QNN.so ${AAR_DIR}/jni/arm64-v8a/ 2>/dev/null || echo "No libMNN_QNN.so"

          # QNN SDK runtime libraries (Qualcomm Hexagon DSP etc.)
          QNN_LIB_DIR="source/backend/qnn/3rdParty/lib"
          if [ -d "${QNN_LIB_DIR}/arm64-v8a" ]; then
            cp -v ${QNN_LIB_DIR}/arm64-v8a/*.so ${AAR_DIR}/jni/arm64-v8a/ 2>/dev/null || echo "No QNN SDK arm64 libs"
          fi

          # libc++_shared from NDK
          LIBC_64=$(find $ANDROID_NDK -name "libc++_shared.so" | grep "aarch64-linux-android" | head -1)
          if [ -n "$LIBC_64" ]; then
            cp -v "$LIBC_64" ${AAR_DIR}/jni/arm64-v8a/
          else
            echo "WARNING: libc++_shared not found for arm64"
          fi

          # -------- Collect armeabi-v7a .so files --------
          echo "=== Collecting armeabi-v7a native libs ==="

          cp -v build_android/armeabi-v7a/libMNN.so ${AAR_DIR}/jni/armeabi-v7a/ 2>/dev/null || echo "No libMNN.so"
          cp -v build_android/armeabi-v7a/source/jni/libmnncore.so ${AAR_DIR}/jni/armeabi-v7a/ 2>/dev/null || echo "No JNI libmnncore.so"
          cp -v build_android/armeabi-v7a/tools/cv/libMNNOpenCV.so ${AAR_DIR}/jni/armeabi-v7a/ 2>/dev/null || echo "No libMNNOpenCV.so"
          cp -v build_android/armeabi-v7a/tools/audio/libMNNAudio.so ${AAR_DIR}/jni/armeabi-v7a/ 2>/dev/null || echo "No libMNNAudio.so"
          cp -v build_android/armeabi-v7a/source/backend/qnn/libMNN_QNN.so ${AAR_DIR}/jni/armeabi-v7a/ 2>/dev/null || echo "No libMNN_QNN.so"

          if [ -d "${QNN_LIB_DIR}/armeabi-v7a" ]; then
            cp -v ${QNN_LIB_DIR}/armeabi-v7a/*.so ${AAR_DIR}/jni/armeabi-v7a/ 2>/dev/null || echo "No QNN SDK armv7 libs"
          fi

          LIBC_32=$(find $ANDROID_NDK -name "libc++_shared.so" | grep "arm-linux-androideabi" | head -1)
          if [ -n "$LIBC_32" ]; then
            cp -v "$LIBC_32" ${AAR_DIR}/jni/armeabi-v7a/
          else
            echo "WARNING: libc++_shared not found for arm32"
          fi

          # -------- Verify collected files --------
          echo ""
          echo "=== arm64-v8a contents ==="
          ls -lh ${AAR_DIR}/jni/arm64-v8a/
          echo ""
          echo "=== armeabi-v7a contents ==="
          ls -lh ${AAR_DIR}/jni/armeabi-v7a/

          # -------- Create AAR structure --------
          # AndroidManifest.xml (required for AAR)
          cat > ${AAR_DIR}/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.taobao.android.mnn">
          </manifest>
          EOF

          # classes.jar (required, can be empty)
          mkdir -p ${AAR_DIR}/tmp_empty
          cd ${AAR_DIR}
          jar cf classes.jar -C tmp_empty .
          rm -rf tmp_empty

          # R.txt (required, can be empty)
          touch R.txt

          # proguard.txt (optional)
          touch proguard.txt

          cd ..

          # -------- Package as AAR (jar = zip with .aar extension) --------
          FINAL_AAR="${AAR_NAME}-${VERSION}.aar"
          cd ${AAR_DIR}
          jar cf ${FINAL_AAR} AndroidManifest.xml classes.jar R.txt proguard.txt jni/
          cd ..

          echo ""
          echo "=== AAR created ==="
          ls -lh ${AAR_DIR}/${FINAL_AAR}

          # Copy to workspace root for upload
          cp ${AAR_DIR}/${FINAL_AAR} ./
          echo "AAR ready: ${FINAL_AAR}"
          echo "aar_path=${FINAL_AAR}" >> $GITHUB_OUTPUT

      - name: Upload AAR as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNN-Android-${{ steps.version.outputs.VERSION }}.aar
          path: ${{ steps.package_aar.outputs.aar_path }}

      - name: Verify AAR exists
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          AAR_FILE="${{ steps.package_aar.outputs.aar_path }}"
          if [ ! -f "$AAR_FILE" ]; then
            echo "ERROR: AAR file not found at $AAR_FILE"
            echo "Workspace contents:"
            ls -la
            exit 1
          fi
          echo "AAR file verified: $AAR_FILE"
          ls -lh "$AAR_FILE"

      - name: Upload AAR to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ steps.package_aar.outputs.aar_path }}
          name: MNN Android ${{ steps.version.outputs.VERSION }} (All Backends)
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
